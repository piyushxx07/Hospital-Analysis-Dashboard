<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversion Results - DataFormat Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card shadow-lg">
                    <div class="card-header bg-success text-white">
                        <h2 class="text-center mb-0"><i class="fas fa-check-circle me-2"></i>Conversion Complete</h2>
                    </div>
                    <div class="card-body p-4">
                        <p class="text-muted text-center lead">Your files have been successfully converted. Here are the details:</p>
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="fas fa-list me-2"></i>Converted Files</h5>
                            <ul class="list-group">
                                {% for conversion in conversions %}
                                <li class="list-group-item"><i class="fas fa-file me-2"></i>{{ conversion }}</li>
                                {% endfor %}
                            </ul>
                        </div>
                        <div class="text-center">
                            <a href="{{ url_for('download_zip', filename=zip_name) }}" class="btn btn-success btn-lg px-5">
                                <i class="fas fa-download me-2"></i>Download Converted Files (ZIP)
                            </a>
                        </div>
                        <div class="text-center mt-3">
                            <a href="{{ url_for('index') }}" class="btn btn-outline-primary">Convert More Files</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
